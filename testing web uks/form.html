<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pasien/Tamu UKS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #ebffeb;
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
      }
      
      .top-section {
        position: relative;
        height: 120px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .logo-uks {
        position: absolute;
        width: 200px;
        left: 20px;
        top: 10px;
      }

      .logo-pmi {
        position: absolute;
        width: 80px;
        right: 20px;
        top: 20px;
      }

      .form-title {
        text-align: center;
        font-size: 26px;
        font-weight: 700;
        margin: 0;
        color: #000;
      }

      .form-container {
        padding: 0 40px;
      }

      .form-card {
        background-color: #97dfab; /* Light green for the card */
        border-radius: 16px;
        padding: 30px 40px;
        max-width: 1000px;
        margin: 0 auto;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      }

      .form-group {
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
      }

      .form-group label {
        font-weight: 700;
        margin-bottom: 8px;
        font-size: 16px;
        color: #000;
      }

      .form-group input {
        background-color: #68b77b; /* Darker green for inputs */
        border: none;
        border-radius: 12px;
        padding: 14px 20px;
        font-size: 16px;
        font-weight: 700;
        color: #000;
        font-family: 'Inter', sans-serif;
        outline: none;
        width: 100%;
        box-sizing: border-box;
      }
      
      .form-group input::placeholder {
        color: rgba(0,0,0,0.5);
      }

      .form-row {
        display: flex;
        gap: 30px;
      }

      .form-group.half {
        flex: 1;
      }

      .submit-container {
        text-align: center;
        margin-top: 40px;
        margin-bottom: 50px;
      }

      .btn-simpan {
        background-color: #68b77b;
        color: white;
        font-weight: 700;
        font-size: 18px;
        font-family: 'Inter', sans-serif;
        border: none;
        border-radius: 12px;
        padding: 12px 40px;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      .btn-simpan:hover {
        background-color: #5aa76d;
      }
    </style>
</head>
<body>
    <div class="top-section">
      <img src="uks.png" class="logo-uks" alt="Logo UKS" />
      <h1 class="form-title">Formulir Pendataan Pasien/Tamu UKS</h1>
      <img src="pmi.png" class="logo-pmi" alt="Logo PMI" />
    </div>

    <div class="form-container">
        <div class="form-card">
            <div class="form-group">
                <label>Nama:</label>
                <input type="text" value="Orang lah pokoknya" placeholder="Masukkan nama" />
            </div>
            
            <div class="form-group">
                <label>Kelas:</label>
                <input type="text" value="X Itulah pokoknya" placeholder="Masukkan kelas" />
            </div>

            <div class="form-row">
                <div class="form-group half">
                    <label>Tanggal</label>
                    <input type="text" value="DD/MM/YYYY" placeholder="DD/MM/YYYY" />
                </div>
                <div class="form-group half">
                    <label>Jam masuk</label>
                    <input type="text" value="HH/MM/SS" placeholder="HH/MM/SS" />
                </div>
            </div>

            <div class="form-group">
                <label>Keterangan:</label>
                <input type="text" value="Demam" placeholder="Masukkan keterangan" />
            </div>

            <div class="form-group">
                <label>Penanganan</label>
                <input type="text" value="Istirahat" placeholder="Masukkan penanganan" />
            </div>
        </div>

        <div class="submit-container">
            <button class="btn-simpan">Simpan</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
